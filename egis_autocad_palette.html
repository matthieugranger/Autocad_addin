<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Egis — AutoCAD Tools</title>
  <style>
    :root {
      --egis-bleu-nuit:  #08212C;
      --egis-vert:       #ABC022;
      --egis-bleu-azur:  #0099A5;
      --egis-gris-bleu:  #5D848A;
      --egis-gris-acier: #97B8BB;
      --egis-orange:     #F75226;
      --font: 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      font-size: 13px;
      background: #F4F7F8;
      color: var(--egis-bleu-nuit);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: var(--egis-bleu-nuit);
      padding: 12px 14px;
      border-bottom: 3px solid var(--egis-vert);
      flex-shrink: 0;
    }
    .header .logo {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.5px;
    }
    .header .logo span { color: var(--egis-vert); }
    .header .sub {
      font-size: 10px;
      color: var(--egis-gris-acier);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* ── Scroll body ── */
    .body {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Cards ── */
    .card {
      background: #fff;
      border-radius: 6px;
      box-shadow: 0 2px 6px rgba(8,33,44,0.10);
      overflow: hidden;
    }
    .card-header {
      background: var(--egis-bleu-azur);
      padding: 9px 13px;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .card-body { padding: 13px; }
    .card-desc {
      font-size: 12px;
      color: var(--egis-gris-bleu);
      margin-bottom: 11px;
      line-height: 1.5;
    }

    /* ── Form ── */
    label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: var(--egis-gris-bleu);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }
    input {
      width: 100%;
      padding: 6px 9px;
      border: 1.5px solid var(--egis-gris-acier);
      border-radius: 4px;
      font-size: 13px;
      font-family: var(--font);
      color: var(--egis-bleu-nuit);
      background: #fafbfc;
      margin-bottom: 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: var(--egis-bleu-azur); background: #fff; }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 9px;
      border: none;
      border-radius: 4px;
      font-family: var(--font);
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn:active { transform: translateY(1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--egis-bleu-azur); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: #007f8a; }
    .btn-secondary { background: var(--egis-vert); color: var(--egis-bleu-nuit); }
    .btn-secondary:hover:not(:disabled) { background: #c4db28; }

    /* ── Status ── */
    .status {
      display: none;
      margin-top: 9px;
      padding: 7px 10px;
      border-radius: 4px;
      font-size: 12px;
      line-height: 1.4;
    }
    .status.show { display: block; }
    .status.info    { background: #E8F6F7; color: #005f6a; border-left: 3px solid var(--egis-bleu-azur); }
    .status.success { background: #F0F6D8; color: #4a5e00; border-left: 3px solid var(--egis-vert); }
    .status.error   { background: #FFF0EE; color: #b33300; border-left: 3px solid var(--egis-orange); }
    .status.warning { background: #FFF8E0; color: #7a5a00; border-left: 3px solid #FDC603; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 13px; height: 13px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 8px;
      font-size: 10px;
      color: var(--egis-gris-acier);
      border-top: 1px solid #e0e8ea;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">egis<span>.</span></div>
    <div class="sub">AutoCAD Tools 2026</div>
  </div>

  <div class="body">

    <!-- ── Cotation ── -->
    <div class="card">
      <div class="card-header">
        📐 Cotation automatique
      </div>
      <div class="card-body">
        <p class="card-desc">Sélectionner une polyligne pour générer une cote alignée sur chaque segment.</p>
        <button class="btn btn-primary" id="btnCotation" onclick="runCotation()">
          📐 Lancer la cotation
        </button>
        <div class="status" id="statusCotation"></div>
      </div>
    </div>

    <!-- ── Numérotation ── -->
    <div class="card">
      <div class="card-header">
        🔢 Numérotation de blocs
      </div>
      <div class="card-body">
        <p class="card-desc">Incrémenter automatiquement un attribut sur une sélection de blocs.</p>
        <label>Attribut (Tag)</label>
        <input type="text" id="inputTag" value="ID" />
        <label>Valeur initiale</label>
        <input type="number" id="inputStart" value="1" min="1" />
        <label>Préfixe</label>
        <input type="text" id="inputPrefix" value="LOT-" />
        <button class="btn btn-secondary" id="btnNum" onclick="runNumerotation()">
          🔢 Lancer la numérotation
        </button>
        <div class="status" id="statusNum"></div>
      </div>
    </div>

  </div>

  <div class="footer">© Egis — AutoCAD Web SDK 2026</div>

  <script>

    // ══════════════════════════════════════════
    // UTILITAIRES
    // ══════════════════════════════════════════

    function setStatus(id, msg, type) {
      var el = document.getElementById(id);
      el.textContent = msg;
      el.className = 'status show ' + type;
    }

    function clearStatus(id) {
      var el = document.getElementById(id);
      el.className = 'status';
    }

    function setLoading(btnId, loading, label) {
      var btn = document.getElementById(btnId);
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<span class="spinner"></span> Traitement…'
        : label;
    }

    // ══════════════════════════════════════════
    // FONCTION 1 — COTATION AUTOMATIQUE
    // ══════════════════════════════════════════

    async function runCotation() {
      var BTN   = 'btnCotation';
      var STA   = 'statusCotation';
      var LABEL = '📐 Lancer la cotation';

      setLoading(BTN, true, LABEL);
      clearStatus(STA);

      try {
        // Délai pour laisser AutoCAD prendre le focus
        await Acad.Editor.executeCommand('_.DELAY 100');

        // Sélection polyligne
        setStatus(STA, '⟳ Sélectionnez une polyligne…', 'info');

        var opts = new Acad.PromptEntityOptions('\nSélectionnez une polyligne : ');
        opts.setRejectMessage('\nPas une polyligne.');
        opts.addAllowedClass('AcDbPolyline', true);

        var res = await Acad.Editor.getEntity(opts);

        if (res.status !== Acad.PromptStatus.OK) {
          setStatus(STA, '⚠ Sélection annulée.', 'warning');
          return;
        }

        // Accès à l'entité
        var doc   = Acad.Application.activeDocument;
        var db    = doc.database;
        var trans = db.transactionManager.startTransaction();

        try {
          var pline = trans.getObject(res.objectId, Acad.OpenMode.forRead);
          var nbSeg = pline.numberOfVertices - 1;

          if (nbSeg < 1) throw new Error('La polyligne doit avoir au moins 2 sommets.');

          var ms = trans.getObject(db.currentSpaceId, Acad.OpenMode.forWrite);

          for (var i = 0; i < nbSeg; i++) {
            var p1 = pline.getPoint3dAt(i);
            var p2 = pline.getPoint3dAt(i + 1);

            // Point de cote décalé perpendiculairement
            var dx  = p2.x - p1.x;
            var dy  = p2.y - p1.y;
            var len = Math.sqrt(dx * dx + dy * dy) || 1;
            var dim = new Acad.AlignedDimension();

            dim.xLine1Point  = p1;
            dim.xLine2Point  = p2;
            dim.dimLinePoint = new Acad.Point3d(
              (p1.x + p2.x) / 2 + (-dy / len) * 1.5,
              (p1.y + p2.y) / 2 + ( dx / len) * 1.5,
              0
            );

            ms.appendEntity(dim);
            trans.addNewlyCreatedDBObject(dim, true);
          }

          trans.commit();
          setStatus(STA, '✓ ' + nbSeg + ' cote(s) créée(s).', 'success');

        } catch (e) {
          trans.abort();
          throw e;
        }

      } catch (err) {
        var msg = err && err.message ? err.message : String(err);
        if (msg.toLowerCase().indexOf('cancel') > -1 || msg.toLowerCase().indexOf('annul') > -1) {
          setStatus(STA, '⚠ Annulé.', 'warning');
        } else {
          setStatus(STA, '✕ ' + msg, 'error');
        }
      } finally {
        setLoading(BTN, false, LABEL);
      }
    }

    // ══════════════════════════════════════════
    // FONCTION 2 — NUMÉROTATION DE BLOCS
    // ══════════════════════════════════════════

    async function runNumerotation() {
      var BTN   = 'btnNum';
      var STA   = 'statusNum';
      var LABEL = '🔢 Lancer la numérotation';

      var tag    = document.getElementById('inputTag').value.trim().toUpperCase();
      var start  = parseInt(document.getElementById('inputStart').value, 10);
      var prefix = document.getElementById('inputPrefix').value;

      if (!tag) {
        setStatus(STA, '⚠ Saisissez un nom d\'attribut.', 'warning');
        return;
      }
      if (isNaN(start) || start < 0) {
        setStatus(STA, '⚠ Valeur initiale invalide.', 'warning');
        return;
      }

      setLoading(BTN, true, LABEL);
      clearStatus(STA);

      try {
        await Acad.Editor.executeCommand('_.DELAY 100');

        setStatus(STA, '⟳ Sélectionnez les blocs…', 'info');

        var selOpts = new Acad.PromptSelectionOptions('\nSélectionnez les blocs : ');
        var selRes  = await Acad.Editor.getSelection(selOpts);

        if (selRes.status !== Acad.PromptStatus.OK) {
          setStatus(STA, '⚠ Sélection annulée.', 'warning');
          return;
        }

        var doc   = Acad.Application.activeDocument;
        var db    = doc.database;
        var trans = db.transactionManager.startTransaction();
        var index = start;
        var maj   = 0;
        var noTag = 0;

        try {
          var ss = selRes.value;
          for (var i = 0; i < ss.count; i++) {
            var objId  = ss.objectIdAt(i);
            var blkRef = trans.getObject(objId, Acad.OpenMode.forRead);

            // Vérifier que c'est un bloc avec attributs
            if (!blkRef.hasAttributeDefinitions) {
              noTag++;
              continue;
            }

            var found = false;
            var attCol = blkRef.attributeCollection;

            for (var j = 0; j < attCol.count; j++) {
              var att = trans.getObject(attCol.objectIdAt(j), Acad.OpenMode.forWrite);
              if (att.tag.toUpperCase() === tag) {
                att.textString = prefix + (index < 10 ? '0' + index : '' + index);
                found = true;
                maj++;
                index++;
                break;
              }
            }

            if (!found) noTag++;
          }

          trans.commit();

          var msg = '✓ ' + maj + ' attribut(s) mis à jour.';
          if (noTag > 0) msg += ' ⚠ ' + noTag + ' sans « ' + tag + ' ».';
          setStatus(STA, msg, maj > 0 ? 'success' : 'warning');

        } catch (e) {
          trans.abort();
          throw e;
        }

      } catch (err) {
        var msg = err && err.message ? err.message : String(err);
        if (msg.toLowerCase().indexOf('cancel') > -1 || msg.toLowerCase().indexOf('annul') > -1) {
          setStatus(STA, '⚠ Annulé.', 'warning');
        } else {
          setStatus(STA, '✕ ' + msg, 'error');
        }
      } finally {
        setLoading(BTN, false, LABEL);
      }
    }

  </script>
</body>
</html>
